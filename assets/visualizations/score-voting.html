<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Score Voting — Engine, Tradeoffs, and Mitigations · CEMA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  --container-bg:        #262a33;
  --container-border:    #8b8a84;
  --ballot-bg:           #13293f;
  --ballot-border:       #5b9bd5;
  --ballot-text:         #9cc4ec;
  --ballot-title:        #b9d6f2;
  --count-bg:            #0e2c25;
  --count-border:        #3fa185;
  --count-text:          #74c9af;
  --count-title:         #96dcc6;
  --label-muted:         #9b9a93;
  --label-strong:        #e6e5e0;
  --arrow:               #8b8a84;
  --voter-bg:            #3a201a;
  --voter-border:        #e07a52;
  --voter-text:          #f0a585;
  --tradeoff-bg:         #352818;
  --tradeoff-border:     #c98f3f;
  --tradeoff-text:       #e0b878;
  --tradeoff-title:      #edcd97;
  --mitigation-bg:       #221f3a;
  --mitigation-border:   #7d74d4;
  --mitigation-text:     #a89ff0;
  --mitigation-title:    #c3bcf7;
  --page-bg:             #1e2129;
  --sans:                system-ui, -apple-system, sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--page-bg);
  padding: 24px 16px;
  display: flex;
  justify-content: center;
}

.viz {
  width: 100%;
  max-width: 760px;
}

svg { width: 100%; height: auto; display: block; }
svg text { font-family: var(--sans); }
</style>
</head>
<body>
<div class="viz">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 600" role="img">
<title>Score voting in practice, with its tradeoffs and mitigations</title>
<desc>A voter at the top marks the ballot and feeds into the engine, a container labeled "Single-winner voting method: Score voting (Range voting)" holding the ballot above the counting rule. The ballot gives each candidate a score on a fixed scale, capturing strength, not just order; the counting rule adds up each candidate's scores across all ballots, and the highest total wins. Below the engine, a box names the single winner: holds the highest total score across all voters. To the right, a Tradeoffs box lists positives (every candidate judged on their own merits, no vote-splitting since scoring one candidate never lowers another, captures strength of preference, and results are summable) and negatives (rewards strategic exaggeration through max/min scoring, and is unfamiliar to most U.S. voters). Below it, a Mitigations box lists a runoff between top scorers (which is STAR), voter education on scoring, and a fixed narrow scale, noting strategic exaggeration can't be fully removed.</desc>
<defs>
<marker id="arrow-score" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="30" y="30" width="300" height="56" rx="8" fill="var(--voter-bg)" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="50" font-size="14" font-weight="500" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Voter</text>
<text x="180" y="70" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Marks the ballot</text>
<line x1="180" y1="90" x2="180" y2="124" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arrow-score)" fill="none"/>

<rect x="30" y="130" width="300" height="300" rx="14" fill="var(--container-bg)" stroke="var(--container-border)" stroke-width="0.5"/>
<text x="50" y="156" font-size="12" fill="var(--label-muted)" dominant-baseline="central">Single-winner voting method</text>
<text x="50" y="178" font-size="14" font-weight="500" fill="var(--label-strong)" dominant-baseline="central">Score voting (Range voting)</text>

<rect x="55" y="200" width="250" height="108" rx="8" fill="var(--ballot-bg)" stroke="var(--ballot-border)" stroke-width="0.5"/>
<text x="180" y="222" font-size="14" font-weight="500" fill="var(--ballot-title)" text-anchor="middle" dominant-baseline="central">Ballot</text>
<line x1="55" y1="242" x2="305" y2="242" stroke="var(--ballot-border)" stroke-width="0.5"/>
<text x="180" y="257" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">Each candidate given a score</text>
<text x="180" y="275" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">on a fixed scale. Captures</text>
<text x="180" y="293" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">strength, not just order.</text>

<line x1="180" y1="312" x2="180" y2="338" stroke="var(--arrow)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-score)" fill="none"/>

<rect x="55" y="342" width="250" height="72" rx="8" fill="var(--count-bg)" stroke="var(--count-border)" stroke-width="0.5"/>
<text x="180" y="364" font-size="14" font-weight="500" fill="var(--count-title)" text-anchor="middle" dominant-baseline="central">Counting rule</text>
<line x1="55" y1="384" x2="305" y2="384" stroke="var(--count-border)" stroke-width="0.5"/>
<text x="180" y="399" font-size="12" fill="var(--count-text)" text-anchor="middle" dominant-baseline="central">Add up each candidate's scores.</text>

<line x1="180" y1="416" x2="180" y2="450" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arrow-score)" fill="none"/>

<rect x="30" y="454" width="300" height="92" rx="8" fill="var(--voter-bg)" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="476" font-size="14" font-weight="500" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Single winner</text>
<line x1="30" y1="496" x2="330" y2="496" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="512" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Holds the highest total score</text>
<text x="180" y="529" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">across all voters.</text>

<rect x="360" y="30" width="290" height="300" rx="8" fill="var(--tradeoff-bg)" stroke="var(--tradeoff-border)" stroke-width="0.5"/>
<text x="375" y="52" font-size="14" font-weight="500" fill="var(--tradeoff-title)" dominant-baseline="central">Tradeoffs</text>
<line x1="360" y1="72" x2="650" y2="72" stroke="var(--tradeoff-border)" stroke-width="0.5"/>
<text x="375" y="92" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  Every candidate judged on</text>
<text x="393" y="110" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">their own merits</text>
<text x="375" y="132" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  No vote-splitting &#8212; scoring</text>
<text x="393" y="150" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">one never lowers another</text>
<text x="375" y="172" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  Captures strength, not</text>
<text x="393" y="190" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">just order</text>
<text x="375" y="212" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  Simple to add up; summable</text>
<text x="375" y="244" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">&#8722;  Rewards strategic</text>
<text x="393" y="262" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">exaggeration (max/min scoring)</text>
<text x="375" y="294" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">&#8722;  Unfamiliar to most U.S. voters</text>

<rect x="360" y="348" width="290" height="198" rx="8" fill="var(--mitigation-bg)" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="370" font-size="14" font-weight="500" fill="var(--mitigation-title)" dominant-baseline="central">Mitigations</text>
<line x1="360" y1="390" x2="650" y2="390" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="410" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Runoff between top scorers</text>
<text x="393" y="428" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">(this is STAR)</text>
<text x="375" y="450" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Voter education on scoring</text>
<text x="375" y="472" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Fixed, narrow scale (0&#8211;5)</text>
<line x1="375" y1="496" x2="635" y2="496" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="512" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">Strategic exaggeration can't</text>
<text x="375" y="530" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">be fully removed.</text>
</svg>
</div>
</body>
</html>
