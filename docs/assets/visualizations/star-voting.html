<style>

<body>
<div class="viz">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" role="img">
<title>STAR voting in practice, with its tradeoffs and mitigations</title>
<desc>A voter at the top marks the ballot and feeds into the engine, a container labeled "Single-winner voting method: STAR voting" holding the ballot above the counting algorithm. The ballot gives each candidate a score on a fixed scale, capturing strength, not just order; the counting algorithm adds up scores to find the two highest candidates, then on every ballot counts each for whichever of those two it scored higher, and the one ahead on more ballots wins. Below the engine, a box names the single winner: preferred head-to-head between the two highest-scoring candidates. To the right, a Tradeoffs box lists positives (captures strength of preference in the scoring round, confirms majority preference in the runoff round, no vote-splitting since scoring one candidate never lowers another, every ballot counts through the final round with none discarded, and the runoff blunts strategic exaggeration) and negatives (the two-step count is less familiar than choose-one, and it leaves a narrow burial incentive where min-scoring a strong rival can help in the runoff). Below it, a Mitigations box lists voter education on the two rounds, the runoff making exaggeration risky, and burial being hard to coordinate, noting no method removes strategic incentives entirely.</desc>
<defs>
<marker id="arrow-star" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="30" y="30" width="300" height="56" rx="8" fill="var(--voter-bg)" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="50" font-size="14" font-weight="500" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Voter</text>
<text x="180" y="70" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Marks the ballot</text>
<line x1="180" y1="90" x2="180" y2="124" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arrow-star)" fill="none"/>

<rect x="30" y="130" width="300" height="338" rx="14" fill="var(--container-bg)" stroke="var(--container-border)" stroke-width="0.5"/>
<text x="50" y="156" font-size="12" fill="var(--label-muted)" dominant-baseline="central">Single-winner voting method</text>
<text x="50" y="178" font-size="14" font-weight="500" fill="var(--label-strong)" dominant-baseline="central">STAR voting</text>

<rect x="55" y="200" width="250" height="108" rx="8" fill="var(--ballot-bg)" stroke="var(--ballot-border)" stroke-width="0.5"/>
<text x="180" y="222" font-size="14" font-weight="500" fill="var(--ballot-title)" text-anchor="middle" dominant-baseline="central">Ballot</text>
<line x1="55" y1="242" x2="305" y2="242" stroke="var(--ballot-border)" stroke-width="0.5"/>
<text x="180" y="257" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">Each candidate given a score</text>
<text x="180" y="275" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">on a fixed scale. Captures</text>
<text x="180" y="293" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">strength, not just order.</text>

<line x1="180" y1="312" x2="180" y2="338" stroke="var(--arrow)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-star)" fill="none"/>

<rect x="55" y="342" width="250" height="110" rx="8" fill="var(--count-bg)" stroke="var(--count-border)" stroke-width="0.5"/>
<text x="180" y="364" font-size="14" font-weight="500" fill="var(--count-title)" text-anchor="middle" dominant-baseline="central">Counting algorithm</text>
<line x1="55" y1="384" x2="305" y2="384" stroke="var(--count-border)" stroke-width="0.5"/>
<text x="180" y="400" font-size="12" fill="var(--count-text)" text-anchor="middle" dominant-baseline="central">Add up scores to find the two</text>
<text x="180" y="419" font-size="12" fill="var(--count-text)" text-anchor="middle" dominant-baseline="central">highest. Then each ballot backs</text>
<text x="180" y="436" font-size="12" fill="var(--count-text)" text-anchor="middle" dominant-baseline="central">the one it scored higher.</text>

<line x1="180" y1="470" x2="180" y2="504" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arrow-star)" fill="none"/>

<rect x="30" y="508" width="300" height="92" rx="8" fill="var(--voter-bg)" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="530" font-size="14" font-weight="500" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Single winner</text>
<line x1="30" y1="550" x2="330" y2="550" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="566" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Preferred head-to-head between</text>
<text x="180" y="583" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">the two highest scorers.</text>

<rect x="360" y="30" width="290" height="300" rx="8" fill="var(--tradeoff-bg)" stroke="var(--tradeoff-border)" stroke-width="0.5"/>
<text x="375" y="52" font-size="14" font-weight="500" fill="var(--tradeoff-title)" dominant-baseline="central">Tradeoffs</text>
<line x1="360" y1="72" x2="650" y2="72" stroke="var(--tradeoff-border)" stroke-width="0.5"/>
<text x="375" y="90" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  Captures strength of</text>
<text x="393" y="108" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">preference (scoring round)</text>
<text x="375" y="130" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  Confirms majority preference</text>
<text x="393" y="148" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">head-to-head (runoff round)</text>
<text x="375" y="170" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  No vote-splitting &#8212; scoring</text>
<text x="393" y="188" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">one never lowers another</text>
<text x="375" y="210" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  Every ballot counts through</text>
<text x="393" y="228" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">the final round &#8212; none dropped</text>
<text x="375" y="250" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  Runoff blunts strategic</text>
<text x="393" y="268" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">exaggeration</text>
<text x="375" y="290" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">&#8722;  Two-step count less familiar</text>
<text x="375" y="312" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">&#8722;  Narrow burial incentive</text>

<rect x="360" y="348" width="290" height="252" rx="8" fill="var(--mitigation-bg)" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="370" font-size="14" font-weight="500" fill="var(--mitigation-title)" dominant-baseline="central">Mitigations</text>
<line x1="360" y1="390" x2="650" y2="390" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="410" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Voter education on the</text>
<text x="393" y="428" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">two rounds</text>
<text x="375" y="450" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Runoff makes exaggeration</text>
<text x="393" y="468" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">risky (can backfire)</text>
<text x="375" y="490" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Burial is hard to coordinate</text>
<text x="393" y="508" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">and can backfire</text>
<line x1="375" y1="532" x2="635" y2="532" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="557" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">No method removes strategic</text>
<text x="375" y="575" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">incentives entirely.</text>
</svg>
</div>
