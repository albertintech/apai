<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ranked Choice Voting — Engine, Tradeoffs, and Mitigations · CEMA</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root {
  --container-bg:        #262a33;
  --container-border:    #8b8a84;
  --ballot-bg:           #13293f;
  --ballot-border:       #5b9bd5;
  --ballot-text:         #9cc4ec;
  --ballot-title:        #b9d6f2;
  --count-bg:            #0e2c25;
  --count-border:        #3fa185;
  --count-text:          #74c9af;
  --count-title:         #96dcc6;
  --label-muted:         #9b9a93;
  --label-strong:        #e6e5e0;
  --arrow:               #8b8a84;
  --voter-bg:            #3a201a;
  --voter-border:        #e07a52;
  --voter-text:          #f0a585;
  --tradeoff-bg:         #352818;
  --tradeoff-border:     #c98f3f;
  --tradeoff-text:       #e0b878;
  --tradeoff-title:      #edcd97;
  --mitigation-bg:       #221f3a;
  --mitigation-border:   #7d74d4;
  --mitigation-text:     #a89ff0;
  --mitigation-title:    #c3bcf7;
  --page-bg:             #1e2129;
  --sans:                system-ui, -apple-system, sans-serif;
}

body {
  font-family: var(--sans);
  background: var(--page-bg);
  padding: 24px 16px;
  display: flex;
  justify-content: center;
}

.viz {
  width: 100%;
  max-width: 760px;
}

svg { width: 100%; height: auto; display: block; }
svg text { font-family: var(--sans); }
</style>
</head>
<body>
<div class="viz">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 630" role="img">
<title>Ranked choice voting in practice, with its tradeoffs and mitigations</title>
<desc>A voter at the top marks the ballot and feeds into the engine, a container labeled "Single-winner voting method: Ranked choice voting (IRV)" holding the ballot above the counting algorithm. The ballot ranks each candidate from most to least preferred, capturing order, not strength; the counting algorithm is the instant-runoff procedure shown in a separate IRV flowchart: first choices are counted, and if no one has more than half, the last-place candidate is dropped and those ballots move to their next choice, repeating until someone passes half. Below the engine, a box names the single winner: holds more than half of the ballots still in the count, not always more than half of all ballots cast. To the right, a Tradeoffs box lists one positive (no vote-splitting among similar candidates in early rounds) and negatives (support can backfire through monotonicity failure, center squeeze eliminates broadly-liked middle candidates, ballot exhaustion discards ballots mid-count, and sequential counting can't be summed precinct by precinct). Below it, a Mitigations box lists allowing more rankings, requiring full rankings, batch elimination, and centralized tabulation, noting none remove center squeeze, monotonicity failure, or the need for centralized counting.</desc>
<defs>
<marker id="arrow-rcv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="30" y="30" width="300" height="56" rx="8" fill="var(--voter-bg)" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="50" font-size="14" font-weight="500" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Voter</text>
<text x="180" y="70" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Marks the ballot</text>
<line x1="180" y1="90" x2="180" y2="124" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arrow-rcv)" fill="none"/>

<rect x="30" y="130" width="300" height="314" rx="14" fill="var(--container-bg)" stroke="var(--container-border)" stroke-width="0.5"/>
<text x="50" y="156" font-size="12" fill="var(--label-muted)" dominant-baseline="central">Single-winner voting method</text>
<text x="50" y="178" font-size="14" font-weight="500" fill="var(--label-strong)" dominant-baseline="central">Ranked choice voting (IRV)</text>

<rect x="55" y="200" width="250" height="108" rx="8" fill="var(--ballot-bg)" stroke="var(--ballot-border)" stroke-width="0.5"/>
<text x="180" y="222" font-size="14" font-weight="500" fill="var(--ballot-title)" text-anchor="middle" dominant-baseline="central">Ballot</text>
<line x1="55" y1="242" x2="305" y2="242" stroke="var(--ballot-border)" stroke-width="0.5"/>
<text x="180" y="263" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">Each candidate ranked from</text>
<text x="180" y="280" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">most to least preferred.</text>
<text x="180" y="297" font-size="12" fill="var(--ballot-text)" text-anchor="middle" dominant-baseline="central">Captures order, not strength.</text>

<line x1="180" y1="312" x2="180" y2="338" stroke="var(--arrow)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-rcv)" fill="none"/>

<rect x="55" y="342" width="250" height="84" rx="8" fill="var(--count-bg)" stroke="var(--count-border)" stroke-width="0.5"/>
<text x="180" y="364" font-size="14" font-weight="500" fill="var(--count-title)" text-anchor="middle" dominant-baseline="central">Counting algorithm</text>
<line x1="55" y1="384" x2="305" y2="384" stroke="var(--count-border)" stroke-width="0.5"/>
<text x="180" y="396" font-size="12" fill="var(--count-text)" text-anchor="middle" dominant-baseline="central">See Instant Runoff Voting</text>
<text x="180" y="414" font-size="12" fill="var(--count-text)" text-anchor="middle" dominant-baseline="central">(IRV) flowchart.</text>

<line x1="180" y1="446" x2="180" y2="480" stroke="var(--arrow)" stroke-width="1.5" marker-end="url(#arrow-rcv)" fill="none"/>

<rect x="30" y="484" width="300" height="92" rx="8" fill="var(--voter-bg)" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="506" font-size="14" font-weight="500" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Single winner</text>
<line x1="30" y1="526" x2="330" y2="526" stroke="var(--voter-border)" stroke-width="0.5"/>
<text x="180" y="542" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">Holds more than half of the</text>
<text x="180" y="559" font-size="12" fill="var(--voter-text)" text-anchor="middle" dominant-baseline="central">ballots still in the count.</text>

<rect x="360" y="30" width="290" height="270" rx="8" fill="var(--tradeoff-bg)" stroke="var(--tradeoff-border)" stroke-width="0.5"/>
<text x="375" y="52" font-size="14" font-weight="500" fill="var(--tradeoff-title)" dominant-baseline="central">Tradeoffs</text>
<line x1="360" y1="72" x2="650" y2="72" stroke="var(--tradeoff-border)" stroke-width="0.5"/>
<text x="375" y="92" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">+  No vote-splitting among</text>
<text x="393" y="110" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">similar candidates early</text>
<text x="375" y="142" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">&#8722;  Support can backfire</text>
<text x="393" y="160" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">(monotonicity failure)</text>
<text x="375" y="182" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">&#8722;  Squeezes out broadly-liked</text>
<text x="393" y="200" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">middle candidates</text>
<text x="375" y="222" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">&#8722;  Ballots discarded mid-count</text>
<text x="393" y="240" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">(ballot exhaustion)</text>
<text x="375" y="262" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">&#8722;  Counting is sequential &#8212;</text>
<text x="393" y="280" font-size="12" fill="var(--tradeoff-text)" dominant-baseline="central">can't be summed by precinct</text>

<rect x="360" y="348" width="290" height="252" rx="8" fill="var(--mitigation-bg)" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="370" font-size="14" font-weight="500" fill="var(--mitigation-title)" dominant-baseline="central">Mitigations</text>
<line x1="360" y1="390" x2="650" y2="390" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="410" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Allow more rankings</text>
<text x="393" y="428" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">(reduces exhaustion)</text>
<text x="375" y="450" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Require full rankings</text>
<text x="393" y="468" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">(not voter-friendly)</text>
<text x="375" y="490" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Batch elimination</text>
<text x="375" y="512" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">&#8226;  Centralized tabulation</text>
<line x1="375" y1="536" x2="635" y2="536" stroke="var(--mitigation-border)" stroke-width="0.5"/>
<text x="375" y="550" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">None remove center squeeze,</text>
<text x="375" y="568" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">monotonicity failure, or the</text>
<text x="375" y="586" font-size="12" fill="var(--mitigation-text)" dominant-baseline="central">need for centralized counting.</text>
</svg>
</div>
</body>
</html>
